<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Storyboard</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", system-ui, sans-serif;
      }

      body {
        margin: 0;
        background: transparent;
        color: #1f2937;
      }

      .board-shell {
        background: rgba(255, 250, 245, 0.86);
        border: 1px solid rgba(194, 120, 67, 0.18);
        border-radius: 16px;
        box-shadow: 0 10px 22px rgba(78, 45, 24, 0.07);
        padding: 0.9rem;
      }

      .board-help {
        color: #7c5a3a;
        font-size: 0.9rem;
        margin: 0 0 0.8rem;
      }

      .board {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .card {
        background: #fffaf5;
        border: 1px solid rgba(194, 120, 67, 0.24);
        border-radius: 14px;
        box-shadow: 0 8px 20px rgba(78, 45, 24, 0.08);
        cursor: pointer;
        overflow: hidden;
        transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
        width: 148px;
      }

      .card:hover {
        box-shadow: 0 12px 26px rgba(78, 45, 24, 0.12);
        transform: translateY(-1px);
      }

      .card.selected {
        border-color: #b45309;
        box-shadow: 0 0 0 2px rgba(180, 83, 9, 0.18), 0 12px 26px rgba(78, 45, 24, 0.12);
      }

      .card.dragging {
        opacity: 0.92;
      }

      .card img {
        aspect-ratio: 4 / 3;
        display: block;
        height: auto;
        object-fit: cover;
        width: 100%;
      }

      .card-header {
        align-items: center;
        background: linear-gradient(180deg, #fff6ec 0%, #fde8d2 100%);
        border-bottom: 1px solid rgba(194, 120, 67, 0.15);
        color: #8c3e0b;
        display: flex;
        font-size: 0.82rem;
        font-weight: 700;
        justify-content: space-between;
        letter-spacing: 0.01em;
        line-height: 1.2;
        min-height: 44px;
        padding: 0.55rem 0.65rem;
      }

      .card-meta {
        align-items: center;
        display: flex;
        gap: 0.4rem;
      }

      .card-actions {
        align-items: center;
        display: inline-flex;
        gap: 0.35rem;
      }

      .card-order {
        color: #b45309;
        font-size: 0.75rem;
        font-weight: 800;
        white-space: nowrap;
      }

      .card-title {
        overflow-wrap: anywhere;
      }

      .card-remove {
        align-items: center;
        appearance: none;
        background: rgba(180, 83, 9, 0.1);
        border: 1px solid rgba(180, 83, 9, 0.18);
        border-radius: 999px;
        color: #9a3412;
        cursor: pointer;
        display: inline-flex;
        flex: 0 0 auto;
        font-size: 0.82rem;
        font-weight: 800;
        height: 24px;
        justify-content: center;
        line-height: 1;
        padding: 0;
        transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
        width: 24px;
      }

      .card-remove:hover:not(:disabled) {
        background: rgba(180, 83, 9, 0.16);
        border-color: rgba(180, 83, 9, 0.28);
        color: #7c2d12;
      }

      .card-remove:disabled {
        cursor: default;
        opacity: 0.45;
      }

      .card-bridge {
        align-items: center;
        appearance: none;
        background: rgba(180, 83, 9, 0.1);
        border: 1px solid rgba(180, 83, 9, 0.18);
        border-radius: 999px;
        color: #9a3412;
        cursor: pointer;
        display: inline-flex;
        flex: 0 0 auto;
        font-size: 0.78rem;
        font-weight: 800;
        height: 24px;
        justify-content: center;
        line-height: 1;
        padding: 0;
        transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
        width: 24px;
      }

      .card-bridge:hover {
        background: rgba(180, 83, 9, 0.16);
        border-color: rgba(180, 83, 9, 0.28);
        color: #7c2d12;
      }

      .card-bridge.off {
        background: rgba(100, 116, 139, 0.12);
        border-color: rgba(100, 116, 139, 0.28);
        color: #475569;
      }

      .selected-note {
        color: #7c5a3a;
        font-size: 0.82rem;
        margin-top: 0.8rem;
      }

      .empty {
        color: #7c5a3a;
        font-size: 0.92rem;
      }
    </style>
  </head>
  <body>
    <div class="board-shell">
      <p class="board-help">Drag thumbnails to change the movie order. Click a card to make it the active still.</p>
      <div id="board" class="board"></div>
      <div id="selected-note" class="selected-note"></div>
      <div id="empty" class="empty" hidden>No stills available.</div>
    </div>

    <script>
      let currentItems = [];
      let currentSelectedId = null;
      let currentDisabledPairKeys = [];
      let sortable = null;

      function sendMessage(type, data) {
        const message = Object.assign(
          { isStreamlitMessage: true, type },
          data || {}
        );
        window.parent.postMessage(message, "*");
      }

      function setFrameHeight() {
        const height = document.documentElement.scrollHeight;
        sendMessage("streamlit:setFrameHeight", { height });
      }

      function setComponentValue(value) {
        sendMessage("streamlit:setComponentValue", { value });
      }

      function renderBoard() {
        const board = document.getElementById("board");
        const empty = document.getElementById("empty");
        const selectedNote = document.getElementById("selected-note");

        board.innerHTML = "";

        if (!currentItems.length) {
          empty.hidden = false;
          selectedNote.textContent = "";
          setFrameHeight();
          return;
        }

        empty.hidden = true;

        currentItems.forEach((item, index) => {
          const card = document.createElement("div");
          card.className = "card";
          card.dataset.id = item.id;
          if (item.id === currentSelectedId) {
            card.classList.add("selected");
          }

          const header = document.createElement("div");
          header.className = "card-header";

          const title = document.createElement("div");
          title.className = "card-title";
          title.textContent = item.name;

          const meta = document.createElement("div");
          meta.className = "card-meta";

          const order = document.createElement("div");
          order.className = "card-order";
          order.textContent = "#" + (index + 1);

          const actions = document.createElement("div");
          actions.className = "card-actions";

          if (item.outgoing_pair_key) {
            const bridgeButton = document.createElement("button");
            bridgeButton.className = "card-bridge";
            bridgeButton.type = "button";
            if (!item.outgoing_enabled) {
              bridgeButton.classList.add("off");
            }
            bridgeButton.textContent = item.outgoing_enabled ? "↻" : "×";
            bridgeButton.title = item.outgoing_enabled
              ? `Break transition to ${item.next_name}`
              : `Restore transition to ${item.next_name}`;
            bridgeButton.setAttribute(
              "aria-label",
              item.outgoing_enabled
                ? `Break transition to ${item.next_name}`
                : `Restore transition to ${item.next_name}`
            );
            bridgeButton.addEventListener("click", (event) => {
              event.stopPropagation();
              const disabled = new Set(currentDisabledPairKeys);
              if (disabled.has(item.outgoing_pair_key)) {
                disabled.delete(item.outgoing_pair_key);
              } else {
                disabled.add(item.outgoing_pair_key);
              }
              currentDisabledPairKeys = Array.from(disabled);
              renderBoard();
              setComponentValue({
                ordered_ids: currentItems.map((entry) => entry.id),
                selected_id: currentSelectedId,
                disabled_pair_keys: currentDisabledPairKeys,
              });
            });
            actions.appendChild(bridgeButton);
          }

          const removeButton = document.createElement("button");
          removeButton.className = "card-remove";
          removeButton.type = "button";
          removeButton.textContent = "x";
          removeButton.title = `Remove ${item.name}`;
          removeButton.setAttribute("aria-label", `Remove ${item.name}`);
          removeButton.disabled = currentItems.length <= 2;
          removeButton.addEventListener("click", (event) => {
            event.stopPropagation();
            currentItems = currentItems.filter((entry) => entry.id !== item.id);
            if (currentSelectedId === item.id) {
              currentSelectedId = (currentItems[index] && currentItems[index].id) || (currentItems[index - 1] && currentItems[index - 1].id) || null;
            }
            renderBoard();
            setComponentValue({
              ordered_ids: currentItems.map((entry) => entry.id),
              selected_id: currentSelectedId,
              disabled_pair_keys: currentDisabledPairKeys.filter((pairKey) => pairKey !== item.outgoing_pair_key),
              removed_id: item.id,
            });
          });

          actions.appendChild(removeButton);
          meta.appendChild(order);
          meta.appendChild(actions);

          header.appendChild(title);
          header.appendChild(meta);

          const image = document.createElement("img");
          image.src = item.thumb;
          image.alt = item.name;
          image.draggable = false;

          card.appendChild(header);
          card.appendChild(image);
          card.addEventListener("click", () => {
            currentSelectedId = item.id;
            renderBoard();
             setComponentValue({
              ordered_ids: currentItems.map((entry) => entry.id),
              selected_id: currentSelectedId,
              disabled_pair_keys: currentDisabledPairKeys,
            });
          });

          board.appendChild(card);
        });

        selectedNote.textContent = currentSelectedId
          ? `Selected still: ${currentSelectedId}`
          : "";

        if (sortable) {
          sortable.destroy();
        }

        sortable = Sortable.create(board, {
          animation: 150,
          ghostClass: "dragging",
          onEnd: () => {
            const ids = Array.from(board.children).map((child) => child.dataset.id);
            currentItems = ids
              .map((id) => currentItems.find((item) => item.id === id))
              .filter(Boolean);
            renderBoard();
            setComponentValue({
              ordered_ids: currentItems.map((entry) => entry.id),
              selected_id: currentSelectedId,
              disabled_pair_keys: currentDisabledPairKeys,
            });
          },
        });

        setFrameHeight();
      }

      function onRender(event) {
        const data = event.data;
        if (!data || data.type !== "streamlit:render") {
          return;
        }

        const args = data.args || {};
        currentItems = Array.isArray(args.items) ? args.items : [];
        currentSelectedId = args.selected_id || (currentItems[0] && currentItems[0].id) || null;
        currentDisabledPairKeys = Array.isArray(args.disabled_pair_keys) ? args.disabled_pair_keys : [];
        renderBoard();
      }

      window.addEventListener("message", onRender);
      sendMessage("streamlit:componentReady", { apiVersion: 1 });
      setFrameHeight();
    </script>
  </body>
</html>
